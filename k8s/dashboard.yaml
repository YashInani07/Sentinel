apiVersion: v1
kind: Service
metadata:
  name: sentinel-dashboard-service
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: sentinel-dashboard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentinel-dashboard
  template:
    metadata:
      labels:
        app: sentinel-dashboard
    spec:
      containers:
        - name: dashboard
          image: sentinel-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: "250m"
              memory: "128Mi"
            requests:
              cpu: "50m"
              memory: "64Mi"
