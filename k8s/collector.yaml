apiVersion: v1
kind: Service
metadata:
  name: sentinel-collector-service
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: sentinel-collector
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sentinel-collector
  template:
    metadata:
      labels:
        app: sentinel-collector
    spec:
      containers:
        - name: collector
          image: sentinel-collector:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: sentinel-config
                  key: DATABASE_URL
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
