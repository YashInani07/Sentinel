version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sentinel-db
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sentinel"]
      interval: 3s
      timeout: 3s
      retries: 10

  collector-service:
    build:
      context: ./collector-service
      dockerfile: Dockerfile
    container_name: sentinel-collector
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/sentinel
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  producer-1:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: sentinel-producer-1
    environment:
      - SERVICE_NAME=producer-1
      - COLLECTOR_URL=http://collector-service:8000
    ports:
      - "8011:8000"
    depends_on:
      - collector-service

  producer-2:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: sentinel-producer-2
    environment:
      - SERVICE_NAME=producer-2
      - COLLECTOR_URL=http://collector-service:8000
    ports:
      - "8012:8000"
    depends_on:
      - collector-service

  producer-3:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: sentinel-producer-3
    environment:
      - SERVICE_NAME=producer-3
      - COLLECTOR_URL=http://collector-service:8000
    ports:
      - "8013:8000"
    depends_on:
      - collector-service

  alert-service:
    build:
      context: ./alert-service
      dockerfile: Dockerfile
    container_name: sentinel-alerts
    environment:
      - COLLECTOR_URL=http://collector-service:8000
      - ALERT_THRESHOLD=5
      - POLL_INTERVAL=10
      - WINDOW_SECONDS=60
    ports:
      - "8001:8000"
    depends_on:
      - collector-service

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: sentinel-dashboard
    ports:
      - "8080:80"
    depends_on:
      - collector-service
      - alert-service

volumes:
  postgres_data:
